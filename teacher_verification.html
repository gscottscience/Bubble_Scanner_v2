        function loadResults() {
            // Try to get results from localStorage first
            const storedResults = localStorage.getItem('teacherVerificationResults');
            if (storedResults) {
                allResults = JSON.parse(storedResults);
                displayResults();
            } else {
                // If no stored results, show message to scan sheets first
                document.getElementById('results-container').innerHTML = 
                    '<div style="text-align: center; padding: 2em; color: #6c757d;">' +
                    '<h3>No results found</h3>' +
                    '<p>Please scan bubble sheets first to generate verification results.</p>' +
                    '<a href="/simple_scan" style="color: #007bff;">Go to Scanner</a>' +
                    '</div>';
            }
        }

        // Display results organized by school, then by test
        function displayResults() {
            if (!allResults || allResults.length === 0) {
                loadResults();
                return;
            }

            updateSummaryStats();

            // Group results by school code first, then by test
            const groupedResults = groupResultsBySchoolAndTest();
            let html = '';
            let isFirstTable = true;

            Object.keys(groupedResults).forEach((schoolCode, schoolIndex) => {
                const schoolResults = groupedResults[schoolCode];
                // Map school code to name for display
                let schoolName = schoolMap && schoolMap[schoolCode] ? schoolMap[schoolCode] : `School ${schoolCode}`;
                html += `<div class="school-section">`;
                Object.keys(schoolResults).forEach(testName => {
                    const testResults = schoolResults[testName];
                    const displayTestName = testName
                        .replace(/ - \d+(st|nd|rd|th) Grade$/i, '')
                        .replace(/ - \d+(st|nd|rd|th) & \d+(st|nd|rd|th) Grades$/i, '')
                        .replace(/ - Grades \d+-\d+$/i, '')
                        .replace(/ \d+(st|nd|rd|th)$/i, '')
                        .trim();
                    // Group by grade
                    const gradeGroups = {};
                    testResults.forEach(r => {
                        const grade = r.parsedInfo.grade;
                        if (!gradeGroups[grade]) gradeGroups[grade] = [];
                        gradeGroups[grade].push(r);
                    });
                    Object.keys(gradeGroups).sort((a, b) => a - b).forEach(grade => {
                            const gradeLabel = grade === '6' ? '6th Grade' : (grade === '7' ? '7th Grade' : (grade === '8' ? '8th Grade' : `Grade ${grade}`));
                        window.currentTestLabel = `${displayTestName} - ${gradeLabel}`;
                        html += `<div class="grade-section table-page-break">`;
                        html += generateTestTable(gradeGroups[grade], testName, isFirstTable, schoolName, `${displayTestName} - ${gradeLabel}`);
                        html += `</div>`;
                        isFirstTable = false;
                    });
                });
                html += `</div>`;
            });

            document.getElementById('results-container').innerHTML = html;
        }


        // School mapping (dynamic)
        let schoolMap = {};
        function loadSchoolMapAndDisplayResults() {
            fetch('/api/school_list').then(r => r.json()).then(data => {
                schoolMap = data;
                displayResults();
            });
        }

        // Call this instead of displayResults() on page load
        window.onload = function() {
            loadSchoolMapAndDisplayResults();
        };

        // Parse student ID to extract grade and school
        function parseStudentId(studentId) {
            if (studentId === null || studentId === undefined) {
                return {
                    grade: null,
                    schoolCode: null,
                    schoolName: 'Unknown School',
                    studentNumber: '',
                    fullStudentId: studentId
                };
            }
            const idStr = studentId.toString().padStart(4, '0');
            const grade = parseInt(idStr[0]);
            const schoolCode = parseInt(idStr[1]);
            const studentNumber = idStr.slice(2);
            const schoolCodeStr = String(schoolCode);
            return {
                grade: grade,
                schoolCode: schoolCode,
                schoolName: schoolMap[schoolCodeStr] || `School ${schoolCodeStr}`,
                studentNumber: studentNumber,
                fullStudentId: studentId
            };
        }

        // Group results by test name and grade level
        function groupResultsByTestAndGrade() {
            const grouped = {};
            
            allResults.forEach(result => {
                // Defensive: skip results with missing studentId or testName
                if (!result || result.studentId === null || result.studentId === undefined || !result.testName) {
                    // Optionally log or warn here
                    return;
                }
                const testName = result.testName || 'Unknown Test';
                if (!grouped[testName]) {
                    grouped[testName] = [];
                }
                // Parse student ID and add school/grade info
                const studentInfo = parseStudentId(result.studentId);
                result.parsedInfo = studentInfo;
                result.grade = studentInfo.grade; // Ensure grade is set correctly
                grouped[testName].push(result);
            });

            // Sort students within each test: first by school, then by grade, then by student number
            Object.keys(grouped).forEach(testName => {
                grouped[testName].sort((a, b) => {
                    // First sort by school code
                    if (a.parsedInfo.schoolCode !== b.parsedInfo.schoolCode) {
                        return a.parsedInfo.schoolCode - b.parsedInfo.schoolCode;
                    }
                    // Then by grade
                    if (a.parsedInfo.grade !== b.parsedInfo.grade) {
                        return a.parsedInfo.grade - b.parsedInfo.grade;
                    }
                    // Finally by student number
                    return a.parsedInfo.studentNumber.localeCompare(b.parsedInfo.studentNumber);
                });
            });

            return grouped;
        }

        // Group results by school and test
        function groupResultsBySchoolAndTest(resultsArray) {
            const grouped = {};
            const arr = resultsArray || allResults;
            arr.forEach(result => {
                if (!result || result.studentId === null || result.studentId === undefined || !result.testName) {
                    return;
                }
                const studentInfo = parseStudentId(result.studentId);
                result.parsedInfo = studentInfo;
                result.grade = studentInfo.grade;
                const schoolCode = studentInfo.schoolCode !== null && studentInfo.schoolCode !== undefined ? String(studentInfo.schoolCode) : 'Unknown';
                if (!grouped[schoolCode]) grouped[schoolCode] = {};
                if (!grouped[schoolCode][result.testName]) grouped[schoolCode][result.testName] = [];
                grouped[schoolCode][result.testName].push(result);
            });
            return grouped;
        }

        // Generate table for a specific test (split into multiple tables for better printing)
        function generateTestTable(results, testName, isFirstTable, schoolName, testLabel) {
            if (results.length === 0) return '';

            const answerKey = results[0].answerKey || {};
            // Get max question number from both answers and answer key
            const maxFromAnswers = Math.max(0, ...results.map(r => {
                const keys = Object.keys(r.answers || {});
                return keys.length > 0 ? Math.max(...keys.map(k => parseInt(k))) : 0;
            }));
            const maxFromKey = Object.keys(answerKey).length > 0 ? Math.max(...Object.keys(answerKey).map(k => parseInt(k))) : 0;
            const maxQuestions = Math.max(maxFromAnswers, maxFromKey);

            let html = '';

            // Deduplicate students by studentId for this test
            const seen = new Set();
            const uniqueResults = results.filter(r => {
                if (seen.has(r.studentId)) return false;
                seen.add(r.studentId);
                return true;
            });

            // Render separate tables for each 20-question section
            const QUESTIONS_PER_ROW = 20;
            const numQuestionRows = Math.ceil(maxQuestions / QUESTIONS_PER_ROW);

            // Wrap all question sections for this school/grade in a single page-break container
            html += '<div class="school-grade-section">';

            // Loop through each 20-question section and create a separate table
            for (let row = 0; row < numQuestionRows; row++) {
                const startQ = row * QUESTIONS_PER_ROW + 1;
                const endQ = Math.min((row + 1) * QUESTIONS_PER_ROW, maxQuestions);
                
                // Check if this section contains tiebreaker questions for Chess Puzzle
                const isChessPuzzle = testName.includes('Chess Puzzle');
                const isTiebreakerSection = isChessPuzzle && startQ >= 21;

                html += '<div class="question-section">';
                if (row === 0) {
                    // Print-only header
                    html += '<div class="print-only" style="margin-bottom: 1em;">';
                    html += `<h2 style="color:#007bff; margin: 0.5em 0; padding: 0;">${schoolName}</h2>`;
                    html += `<h3 style="color:#007bff; margin: 0.5em 0; padding: 0;">${testLabel}</h3>`;
                    html += '</div>';
                    // Web-view header
                    html += '<div class="screen-only" style="margin-bottom: 1em;">';
                    html += `<h2 style="color:#007bff; margin: 0.5em 0; padding: 0;">${schoolName}</h2>`;
                    html += `<h3 style="color:#007bff; margin: 0.5em 0; padding: 0;">${testLabel}</h3>`;
                    html += '</div>';
                }
                
                // Add tiebreaker section header if applicable
                if (isTiebreakerSection) {
                    html += '<h4 style="color:#495057; margin: 1em 0 0.5em 0; font-weight: bold;">Tiebreaker (0.01 points each)</h4>';
                }
                html += '<div class="scroll-table-container" style="overflow-x: auto; width: 100%;">';
                html += '<table class="scroll-table" style="table-layout: fixed; min-width: 900px;">';
                html += '<colgroup>';
                html += '<col class="student-id" style="width:140px;min-width:140px;max-width:180px;">';
                html += '<col class="score-cell" style="width:80px;min-width:80px;max-width:100px;">';
                html += '<col class="correct-cell" style="width:100px;min-width:100px;max-width:120px;">';
                html += '<col class="incorrect-cell" style="width:120px;min-width:120px;max-width:140px;">';
                for (let q = startQ; q <= endQ; q++) {
                    html += '<col class="answer-cell" style="width:36px;min-width:36px;max-width:36px;">';
                }
                for (let q = endQ + 1; q <= startQ + QUESTIONS_PER_ROW - 1; q++) {
                    html += '<col class="answer-cell" style="width:36px;min-width:36px;max-width:36px;">';
                }
                html += '</colgroup>';
                html += '<thead>';
                html += '<tr>';
                html += '<th class="answer-cell student-id" style="color:#222; position: sticky; left: 0; background: #fff; z-index: 3;">Student ID#</th>';
                html += '<th class="answer-cell score-cell" style="color:#222; position: sticky; left: 140px; background: #fff; z-index: 3;">Score</th>';
                html += '<th class="answer-cell correct-cell" style="color:#222; position: sticky; left: 220px; background: #fff; z-index: 3;">Correct</th>';
                html += '<th class="answer-cell incorrect-cell" style="color:#222; position: sticky; left: 320px; background: #fff; z-index: 3;">Incorrect</th>';
                for (let q = startQ; q <= endQ; q++) {
                    html += `<th class="answer-cell">Q${q}</th>`;
                }
                for (let q = endQ + 1; q <= startQ + QUESTIONS_PER_ROW - 1; q++) {
                    html += `<th class="answer-cell"></th>`;
                }
                html += '</tr>';
                html += '<tr class="answer-key-row">';
                html += '<td class="answer-cell student-id" style="background:#d4edff !important; position: sticky; left: 0; z-index: 2;"><strong>Answer Key</strong></td>';
                html += '<td class="answer-cell score-cell" style="background:#d4edff !important; position: sticky; left: 140px; z-index: 2;"></td>';
                html += '<td class="answer-cell correct-cell" style="background:#d4edff !important; position: sticky; left: 220px; z-index: 2;"></td>';
                html += '<td class="answer-cell incorrect-cell" style="background:#d4edff !important; position: sticky; left: 320px; z-index: 2;"></td>';
                for (let q = startQ; q <= endQ; q++) {
                    html += `<td class="answer-cell"><strong>${answerKey[String(q)] || '-'}</strong></td>`;
                }
                for (let q = endQ + 1; q <= startQ + QUESTIONS_PER_ROW - 1; q++) {
                    html += '<td class="answer-cell"></td>';
                }
                html += '</tr>';
                html += '</thead>';
                html += '<tbody>';
                uniqueResults.forEach((result, idx) => {
                    html += `<tr class="student-row">`;
                    html += `<td class="answer-cell student-id" style="position: sticky; left: 0; background: #fff; z-index: 1;">${result.studentId || ''}</td>`;
                    const score = calculateScore(result.answers, answerKey, testName);
                    html += `<td class="answer-cell score-cell" style="position: sticky; left: 140px; background: #fff; z-index: 1;">${score.points}</td>`;
                    html += `<td class="answer-cell correct-cell" style="position: sticky; left: 220px; background: #fff; z-index: 1;">${score.correct}</td>`;
                    html += `<td class="answer-cell incorrect-cell" style="position: sticky; left: 320px; background: #fff; z-index: 1;">${score.incorrect}</td>`;
                    for (let q = startQ; q <= endQ; q++) {
                        const qStr = String(q);
                        let studentAnswer = result.answers[qStr];
                        if (studentAnswer === undefined || studentAnswer === null) studentAnswer = '';
                        if (typeof studentAnswer === 'string') studentAnswer = studentAnswer.trim();
                        const correctAnswer = answerKey[qStr] || '';
                        const isBlank = studentAnswer === '' || studentAnswer === '--';
                        const isCorrect = !isBlank && correctAnswer && studentAnswer.toUpperCase() === correctAnswer.toUpperCase();
                        let cellClass = 'answer-cell';
                        // Only highlight as incorrect if not blank and not correct
                        if (!isBlank && !isCorrect) {
                            cellClass += ' incorrect-answer';
                        }
                        // If blank, show '--'
                        html += `<td class=\"${cellClass}\">${isBlank ? '--' : studentAnswer}</td>`;
                    }
                    for (let q = endQ + 1; q <= startQ + QUESTIONS_PER_ROW - 1; q++) {
                        html += '<td class="answer-cell"></td>';
                    }
                    html += '</tr>';
                });
                html += '</tbody>';
                html += '</table>';
                html += '</div>';
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        // Calculate score for a student using test-specific scoring formula
        function calculateScore(answers, answerKey, testName) {
            if (typeof testName === 'undefined') testName = '';
            console.log('calculateScore called with testName:', testName);
            let correct = 0;
            let incorrect = 0;
            let total = 0;
            let tiebreakerCorrect = 0;

            // Get scoring configuration for this test
            const config = scoringConfigs[testName] || scoringConfigs['Default'];
            console.log('Using config:', config, 'for test:', testName);
            
            // For Chess Puzzle, questions 1-20 are main, 21-28 are tiebreaker
            const isChessPuzzle = testName.includes('Chess Puzzle');
            const tiebreakerStart = isChessPuzzle ? 21 : 999; // Questions 21+ are tiebreaker

            // Count correct and incorrect answers, ignore blanks
            Object.keys(answerKey).forEach(q => {
                const qNum = Number(q);
                const qStr = String(q);
                let studentAnswer = answers[qStr];
                const correctAnswer = answerKey[qStr] || '';
                // Normalize blank/empty answers
                if (studentAnswer === undefined || studentAnswer === null) studentAnswer = '';
                if (typeof studentAnswer === 'string') studentAnswer = studentAnswer.trim().toUpperCase();
                // Treat '--' and '' as blank
                const isBlank = studentAnswer === '' || studentAnswer === '--';
                if (isBlank) {
                    // Do not count blank answers as incorrect or correct
                    return;
                }
                if (correctAnswer) {
                    total++;
                    if (studentAnswer === correctAnswer.toUpperCase()) {
                        if (isChessPuzzle && qNum >= tiebreakerStart) {
                            tiebreakerCorrect++;
                        } else {
                            correct++;
                        }
                    } else {
                        incorrect++;
                    }
                }
            });

            // Calculate points using the test's formula
            let totalScore = (correct * config.correctPoints) + (incorrect * config.incorrectPoints);
            
            console.log('Score calculation:', {
                correct,
                incorrect,
                correctPoints: config.correctPoints,
                incorrectPoints: config.incorrectPoints,
                totalScore,
                testName
            });

            // Add tiebreaker points if applicable (Chess Puzzle)
            if (config.tiebreaker && tiebreakerCorrect > 0) {
                totalScore += tiebreakerCorrect * config.tiebreaker;
            }
            
            // Format score to 2 decimals for Chess Puzzle
            if (isChessPuzzle) {
                totalScore = parseFloat(totalScore.toFixed(2));
            }

            // Calculate max possible points
            let maxPossiblePoints;
            if (isChessPuzzle) {
                // For Chess Puzzle: 20 regular questions (1 point each) + 8 tiebreaker questions (0.01 each)
                const regularQuestions = 20;
                const tiebreakerQuestions = 8;
                maxPossiblePoints = parseFloat(((regularQuestions * config.correctPoints) + (tiebreakerQuestions * config.tiebreaker)).toFixed(2));
            } else {
                maxPossiblePoints = (correct + incorrect) * config.correctPoints;
            }

            return { 
                correct, 
                incorrect, 
                total, 
                points: totalScore,
                tiebreakerCorrect: tiebreakerCorrect,
                maxPossiblePoints: maxPossiblePoints,
                description: config.description
            };
        }

                                        if (v === undefined || v === null) v = '';
                                        if (typeof v === 'string') v = v.trim();
                                        if (v !== '' && v !== '--') filtered[k] = v;
                                    });

                                const score = calculateScore(filteredAnswersForScore(result.answers), answerKey, testName);

                                html += `<div class=\"vertical-student-card ${sizeClass}\">`;

                                html += `<div class=\"vertical-header-cell\"><strong>Initials: <span class=\"initials-line\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></strong></div>`;
                                html += `</div>`;
                                html += `</div>`;
                                if (testLayout.sections) {
                                    testLayout.sections.forEach(section => {
                                        html += `<h5 style=\"font-weight: bold; margin: 0.8em 0 0.3em 0; color: #495057;\">${section.title}</h5>`;
                                        html += `<div class=\"vertical-answers-grid\" style=\"grid-template-columns: repeat(${section.columns}, 1fr);\">`;
                                        let displayNum = 1;
                                        section.ranges.forEach(([start, end], colIdx) => {
                                            html += `<div class=\"vertical-column\">`;
                                            for (let q = start; q <= end && q <= maxQ; q++) {
                                                let studentAnswer = result.answers[String(q)];
                                                if (studentAnswer === undefined || studentAnswer === null) studentAnswer = '';
                                                if (typeof studentAnswer === 'string') studentAnswer = studentAnswer.trim();
                                                const correctAnswer = answerKey[String(q)] || '-';
                                                const isBlank = studentAnswer === '' || studentAnswer === '--';
                                                const isCorrect = !isBlank && studentAnswer === correctAnswer;
                                                const answerClass = isBlank ? '' : (isCorrect ? 'correct' : 'incorrect');
                                                // For Chess tiebreaker, display 1-4 and 5-8 instead of 21-24 and 25-28
                                                let questionLabel = q;
                                                if (section.title === 'Tiebreaker' && testName.includes('Chess Puzzle')) {
                                                    if (colIdx === 0) {
                                                        questionLabel = q - 20; // 21-24 -> 1-4
                                                    } else if (colIdx === 1) {
                                                        questionLabel = q - 24; // 25-28 -> 1-4, but want 5-8
                                                        questionLabel += 4;     // 1-4 -> 5-8
                                                    }
                                                } else if (section.title === 'Tiebreaker') {
                                                    questionLabel = displayNum;
                                                }
                                                html += `<div class=\"vertical-answer-row\">`;
                                                html += `<span class=\"vertical-question-num\">${questionLabel}.</span>`;
                                                html += `<span class=\"vertical-answer${answerClass ? ' ' + answerClass : ''}\">${isBlank ? '--' : studentAnswer}</span>`;
                                                html += `</div>`;
                                                displayNum++;
                                            }
                                            html += `</div>`;
                                        });
                                        html += `</div>`;
                                    });
                                } else {
                                    // Multi-column vertical answer grid using testLayout.ranges
                                    html += `<div class=\"vertical-answers-grid ${forceThreeColClass}\" style=\"display: grid; grid-template-columns: repeat(${testLayout.columns}, 1fr); gap: 0.5em;\">`;
                                    // Flatten all questions into a single array
                                    let allQuestions = [];
                                    testLayout.ranges.forEach(([start, end]) => {
                                        for (let q = start; q <= end && q <= maxQ; q++) {
                                            allQuestions.push(q);
                                        }
                                    });
                                    // Split questions into columns
                                    let questionsPerCol = Math.ceil(allQuestions.length / testLayout.columns);
                                    for (let col = 0; col < testLayout.columns; col++) {
                                        html += `<div class=\"vertical-column\">`;

                                            const correctAnswer = answerKey[String(q)] || '-';

                                            html += `<div class=\"vertical-answer-row\">`;

        // Export to CSV format
    function exportToCSV() {
        if (!allResults || allResults.length === 0) {
            alert('No results to export');
            return;
        }

        // Group by test and grade
        const groupedResults = groupResultsByTestAndGrade();
        let csv = '';
        let filename = '';
        let firstTest = null;
        let firstGrade = null;
        // Compose CSV for each test/grade
        Object.keys(groupedResults).forEach(testName => {
            const testResults = groupedResults[testName];
            if (!testResults || testResults.length === 0) return;
            // Use first result for grade
            const grade = testResults[0].grade || '';
                // Use only the base test name for CSV column (strip all grade and extra info)
                let shortName = shortTestNames[testName] || testName;
                shortName = shortName.replace(/ - .*/, '');
                shortName = shortName.replace(/\s*\d+(st|nd|rd|th)?$/, '');
                shortName = shortName.replace(/Grades?\s*\d+(-\d+)?/, '');
                shortName = shortName.replace(/\s*-\s*$/, '');
                shortName = shortName.trim();
            if (!firstTest) firstTest = testName;
            if (!firstGrade) firstGrade = grade;
            // Find max questions for this test (check both answers and answer key)
            const answerKey = testResults[0].answerKey || {};
            const maxFromAnswers = Math.max(0, ...testResults.map(r => {
                const keys = Object.keys(r.answers || {});
                return keys.length > 0 ? Math.max(...keys.map(k => parseInt(k))) : 0;
            }));
            const maxFromKey = Object.keys(answerKey).length > 0 ? Math.max(...Object.keys(answerKey).map(k => parseInt(k))) : 0;
            const maxQuestions = Math.max(maxFromAnswers, maxFromKey);
            
            // Check if this is Chess Puzzle for tiebreaker labeling
            const isChessPuzzle = testName.includes('Chess Puzzle');
            
            // Header
            csv += "Event,Test Name,Grade,Event+ID,Student ID,Score,Correct,Incorrect";
            for (let q = 1; q <= maxQuestions; q++) {
                // Label tiebreaker questions (21-28) as TB1-TB8 for Chess Puzzle
                if (isChessPuzzle && q >= 21 && q <= 28) {
                    csv += ",TB" + (q - 20);
                } else {
                    csv += ",Q" + q;
                }
            }
            csv += "\n";
            // Answer key row (answerKey already declared above)
                // Create standardized event name for answer key row
                let answerKeyEventName = shortName
                    .replace('Art Part B', 'Art')
                    .replace('Dictionary Skills', 'Dictionary')
                    .replace('Maps, Graphs, & Charts', 'Maps')
                    .replace('Social Studies', 'SocialStudies')
                    .replace(/\s+/g, '') + ' ' + grade;
                csv += '"' + answerKeyEventName + '","' + shortName + '","' + grade + '",,,,,"Answer Key"';
            for (let q = 1; q <= maxQuestions; q++) {
                csv += ',"' + (answerKey[q] || '') + '"';
            }
            csv += "\n";
            // Deduplicate student rows by studentId
            // Sort results by studentId (as string, so leading digits matter)
            const uniqueResults = [];
            const seenStudentIds = new Set();
            testResults.forEach(result => {
                if (!seenStudentIds.has(result.studentId)) {
                    seenStudentIds.add(result.studentId);
                    uniqueResults.push(result);
                }
            });
            uniqueResults.sort((a, b) => String(a.studentId).localeCompare(String(b.studentId)));
            uniqueResults.forEach(result => {
                // Always use the correct grade for each student
                const studentGrade = (result.parsedInfo && result.parsedInfo.grade) ? result.parsedInfo.grade : (parseStudentId(result.studentId).grade);
                const score = calculateScore(result.answers, answerKey, testName);
                    // Create standardized event name and combined Event+StudentID
                    let eventName = shortName
                        .replace('Art Part B', 'Art')
                        .replace('Dictionary Skills', 'Dictionary')
                        .replace('Maps, Graphs, & Charts', 'Maps')
                        .replace('Social Studies', 'SocialStudies')
                        .replace(/\s+/g, '') + ' ' + studentGrade;
                    let eventIdCombo = eventName + result.studentId;
                    // Format: Event, Test Name, Grade, Event+ID, Student ID, Score, Correct, Incorrect
                    csv += '"' + eventName + '","' + shortName + '","' + studentGrade + '","' + eventIdCombo + '","' + result.studentId + '",' + score.points + ',' + score.correct + ',' + score.incorrect;
                for (let q = 1; q <= maxQuestions; q++) {
                    csv += ',"' + (result.answers[q] || '') + '"';
                }
                csv += "\n";
            });
            csv += "\n";
        }); // End of Object.keys(groupedResults).forEach
        // Set filename to standardized event name and date
        if (firstTest) {
            // Create standardized base name
            let baseTestName = firstTest
                .replace(/ - \d+(st|nd|rd|th) Grade$/i, '')
                .replace(/ - \d+(st|nd|rd|th) & \d+(st|nd|rd|th) Grades$/i, '')
                .replace(/ - Grades \d+-\d+$/i, '')
                .replace(/ \d+(st|nd|rd|th)$/i, '')
                .replace('Art Part B', 'Art')
                .replace('Dictionary Skills', 'Dictionary')
                .replace('Maps, Graphs, & Charts', 'Maps')
                .replace('Social Studies', 'SocialStudies')
                .replace(/\s+/g, '');
            // Clean up grade for filename
            let gradePart = (firstGrade || '').toString().replace(/[^A-Za-z0-9]/g, '');
            // Format date as MM-DD-YY
            let d = new Date();
            let mm = String(d.getMonth() + 1).padStart(2, '0');
            let dd = String(d.getDate()).padStart(2, '0');
            let yy = String(d.getFullYear()).slice(-2);
            let datePart = mm + "-" + dd + "-" + yy;
            filename = baseTestName + gradePart + "_" + datePart + ".csv";
        } else {
            filename = "Teacher_Verification_" + (new Date().toISOString().slice(0,10)) + ".csv";
        }
        // Download CSV file
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } // End of exportToCSV

        // Public function to add results (called from scanning page)
    window.addResultsForVerification = function(results, testName, answerKey) {
            // Convert answer key string (or object) to normalized object
            const answerKeyObj = {};
            if (answerKey && typeof answerKey === 'string') {
                safeSplit(answerKey).forEach(pair => {
                    if (pair && pair.trim()) {
                        const parts = pair.split(':');
                        const q = parts[0];
                        const a = parts.slice(1).join(':');
                        if (q && a) answerKeyObj[parseInt(q.trim())] = a.trim().toUpperCase();
                    }
                });
            } else if (answerKey && typeof answerKey === 'object') {
                // Already an object; copy values (ensure uppercase)
                Object.keys(answerKey).forEach(k => {
                    answerKeyObj[parseInt(k)] = (answerKey[k] || '').toString().trim().toUpperCase();
                });
            }

            // Process each result, normalize answers keys to strings
            results.forEach(result => {
                const normalizedAnswers = {};
                if (result.answers && typeof result.answers === 'object') {
                    Object.keys(result.answers).forEach(k => {
                        normalizedAnswers[String(k)] = result.answers[k];
                    });
                }
                allResults.push({
                    testName: testName,
                    studentId: result.student_id,
                    answers: normalizedAnswers,
                    answerKey: answerKeyObj,
                    timestamp: new Date().toISOString()
                });
            });

            // Save to localStorage
            localStorage.setItem('teacherVerificationResults', JSON.stringify(allResults));
            
            // Refresh display
            displayResults();
        };
